name: Release

run-name: Release ${{ inputs.release_tag || github.ref_name }} for ${{ inputs.release_plan || 'direct' }}

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable SDK release tag to publish or verify
        required: true
        type: string
      release_plan:
        description: Immutable release-plan tag initiating this recovery run
        required: false
        default: direct
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish exact crates.io package
    runs-on: ubuntu-latest
    environment: crates-io
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - name: Resolve exact release identity
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$REQUESTED_RELEASE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            printf 'release tag must be an exact SDK SemVer: %s\n' "$REQUESTED_RELEASE_TAG" >&2
            exit 1
          fi
          head_commit="$(git rev-parse HEAD)"
          tag_commit="$(git rev-list -n 1 "$REQUESTED_RELEASE_TAG")"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            printf 'release tag %s does not identify checkout commit %s\n' "$REQUESTED_RELEASE_TAG" "$head_commit" >&2
            exit 1
          fi
          {
            printf 'RELEASE_TAG=%s\n' "$REQUESTED_RELEASE_TAG"
            printf 'RELEASE_COMMIT=%s\n' "$head_commit"
          } >> "$GITHUB_ENV"

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@4d407b29186a635f0cc27475ef0bc0ae605a8866  # 1.86.0

      - name: Publish and verify exact crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: scripts/ci/publish-rust-sdk.sh

      - name: Create the source GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            arguments=(--verify-tag --generate-notes --title "$RELEASE_TAG")
            if [[ "$RELEASE_TAG" == *-* ]]; then
              arguments+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" "${arguments[@]}"
          fi

      - name: Upload release evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: rust-sdk-release-evidence-${{ env.RELEASE_TAG }}
          path: rust-sdk-release-evidence.json
          if-no-files-found: error
