name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish exact crates.io package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Publish and verify exact crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: scripts/ci/publish-rust-sdk.sh

      - name: Upload release evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdk-release-evidence-${{ github.ref_name }}
          path: rust-sdk-release-evidence.json
          if-no-files-found: error
