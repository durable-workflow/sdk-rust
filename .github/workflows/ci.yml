name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        rust: ['1.86.0', 'stable']
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test all targets
        run: cargo test --all-targets

      - name: Build warning-free API documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

      - name: Verify publishable package
        run: cargo package

      - name: Validate release tooling
        run: |
          bash -n scripts/ci/crates-io-publish-lib.sh scripts/ci/publish-rust-sdk.sh scripts/ci/test-crates-io-publish.sh
          python -m py_compile scripts/ci/component-release-recovery.py scripts/ci/publish-planned-tag.py scripts/ci/test-component-release-recovery.py scripts/ci/test-publish-planned-tag.py scripts/ci/test-publish-rust-sdk.py
          scripts/ci/test-crates-io-publish.sh
          python scripts/ci/test-component-release-recovery.py
          python scripts/ci/test-publish-planned-tag.py
          python scripts/ci/test-publish-rust-sdk.py

  target-branch-qualification:
    name: Target branch qualification
    if: ${{ always() }}
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require the MSRV and current stable toolchains
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: test "$VERIFY_RESULT" = success
